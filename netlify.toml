# Next.js（含 App Router / Route Handlers）在 Netlify 上由 OpenNext 适配器处理；
# 勿使用「拖文件夹 / Netlify Drop」部署本仓库——那无法完成 next build 与 API 路由。
# 请用「Add new project」连接 Git，并在后台配置环境变量（与本地 .env.local 对应）。
#
# 对话 / 爆改等 AI 能力依赖服务端变量 DEEPSEEK_API_KEY（勿用 NEXT_PUBLIC_ 前缀；值不要加引号）。
# Netlify：Site configuration → Environment variables → 添加后「Clear cache and deploy site」。
#
# 文档：https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

