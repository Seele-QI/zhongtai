# ────────────────────────────────────────────────────────────────
#  docker compose up -d  一键启动全栈服务
#  - web（Next.js）: localhost:3000
#  - api（FastAPI）: localhost:8000
#  生产环境建议前面加 nginx/Caddy 反代 + HTTPS
# ────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_FASTAPI_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - zhongtai_data:/data
    environment:
      - VIDEO_BGM_DIR=/app/assets/bgm
      - DATA_DIR=/data
      - CREDIT_DB_OVERRIDE=/data/accounts.db
      - PYTHONUNBUFFERED=1
      # ↓ 以下按实际情况填写
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - RUNNINGHUB_API_KEY=${RUNNINGHUB_API_KEY}
      - EMAIL_HASH_SALT=${EMAIL_HASH_SALT}
      - CREDIT_REGISTER_BONUS=100
      - CREDIT_ADMIN_ACCESS_KEY=${CREDIT_ADMIN_ACCESS_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=${RESEND_FROM:-AgentHub <onboarding@resend.dev>}
      - APP_PUBLIC_BASE=${APP_PUBLIC_BASE:-http://localhost:3000}
      - DEV_EMAIL_MODE=${DEV_EMAIL_MODE:-1}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
    restart: unless-stopped

volumes:
  zhongtai_data:
    driver: local
